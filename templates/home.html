<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>name::vector · green/black interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
        }

        body {
            background: #0b0f0b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .terminal-container {
            max-width: 1300px;
            width: 100%;
            background: #0f130f;
            border: 2px solid #2a8c5e;
            box-shadow: 0 0 25px #1e4a2e, inset 0 0 5px #1a3a1e;
            border-radius: 18px;
            padding: 28px 30px;
            color: #b3ffcf;
        }

        /* header with scanlines */
        .header {
            border-bottom: 1px solid #2a8c5e;
            padding-bottom: 18px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .header::before {
            content: "● NAMESPACE 0x7E3";
            position: absolute;
            top: -10px;
            left: 15px;
            background: #0f130f;
            padding: 0 15px;
            font-size: 0.85rem;
            color: #5faf7a;
            letter-spacing: 1.5px;
        }

        .title {
            font-size: 2rem;
            font-weight: 400;
            text-shadow: 0 0 8px #26c46e;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title span {
            font-size: 1.2rem;
            background: #1b331f;
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #2a8c5e;
            color: #acf7c1;
        }

        .status-led {
            display: flex;
            gap: 22px;
            color: #6f9e7c;
        }

        .led {
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .led::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 10px #00e676;
        }

        /* input row — Gmail style chips */
        .name-input-panel {
            background: #141b14;
            border: 2px solid #2a6e4a;
            border-radius: 50px;
            padding: 8px 12px 8px 22px;
            margin: 25px 0 18px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            flex: 1;
        }

        .chip {
            background: #1d3522;
            border: 1px solid #36b86c;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: #ccffdb;
            font-size: 1rem;
            font-weight: 450;
            box-shadow: 0 0 6px #1f9f4e;
            transition: 0.1s linear;
        }

        .chip-remove {
            background: none;
            border: none;
            color: #53e08b;
            font-size: 1.5rem;
            line-height: 1;
            cursor: pointer;
            padding: 0 4px;
            font-weight: bold;
            transition: 0.1s;
        }
        .chip-remove:hover {
            color: #ff5f7c;
            text-shadow: 0 0 8px red;
            transform: scale(1.2);
        }

        .input-field {
            background: transparent !important;
            border: none !important;
            outline: none;
            color: #9fffc2;
            font-size: 1.1rem;
            min-width: 200px;
            flex: 1;
            padding: 8px 0;
        }
        .input-field::placeholder {
            color: #376d47;
            font-style: italic;
        }

        .analyze-btn {
            background: #17331e;
            border: 2px solid #41b078;
            color: #b5ffcc;
            padding: 12px 32px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 0 12px #257445;
            display: flex;
            align-items: center;
            gap: 14px;
            white-space: nowrap;
        }

        .analyze-btn:hover {
            background: #1f4a2a;
            box-shadow: 0 0 22px #36c57a;
            border-color: #73ffb3;
            color: #ffffff;
        }

        /* main grid: left similarity + right graph */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.1fr 1.9fr;
            gap: 25px;
            margin-top: 30px;
        }

        .similarities-panel {
            background: #0d140e;
            border: 1px solid #2c7e50;
            border-radius: 20px;
            padding: 22px 16px;
            box-shadow: inset 0 0 15px #0f2f18;
        }

        .panel-header {
            font-size: 1.2rem;
            margin-bottom: 22px;
            color: #8cf0b2;
            border-left: 6px solid #3bad6b;
            padding-left: 16px;
            text-transform: uppercase;
        }

        .similarity-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .score-card {
            background: #162116;
            border-radius: 18px;
            padding: 18px 20px;
            border: 1px solid #2e8253;
            box-shadow: 0 5px 0 #0f321b;
        }

        .pair-names {
            font-size: 1.25rem;
            font-weight: 600;
            color: #bef5d2;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pair-names code {
            background: #283f2b;
            padding: 4px 8px;
            border-radius: 30px;
            color: #d0ffd0;
            font-size: 0.9rem;
        }

        .meter {
            background: #1c2b1f;
            height: 22px;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid #2f9f5a;
            margin: 8px 0 12px;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1db954, #6df0a0);
            box-shadow: 0 0 12px #2aff7e;
            border-radius: 30px;
            transition: width 0.2s ease;
        }

        .score-value {
            text-align: right;
            font-size: 1.3rem;
            color: #b1ffc4;
            font-weight: 600;
        }
        .score-value small {
            font-size: 0.9rem;
            color: #6fa883;
        }

        .graph-panel {
            background: #0c130c;
            border: 1px solid #31a363;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .graph-placeholder {
            flex: 1;
            background: #101910;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #2d8f55;
            min-height: 360px;
            color: #379959;
            font-size: 1rem;
            text-align: center;
            padding: 20px;
        }

        #plotImage {
            max-width: 100%;
            max-height: 400px;
            border-radius: 16px;
            border: 2px solid #27834b;
            box-shadow: 0 0 30px #1a4b28;
            display: none;
        }

        .coord-footnote {
            margin-top: 12px;
            color: #528f68;
            font-size: 0.8rem;
            border-top: 1px solid #255f37;
            padding-top: 12px;
            display: flex;
            gap: 24px;
        }

        .coord-footnote span {
            color: #a9f7c3;
        }

        /* utility classes */
        .blinking-cursor {
            animation: blink 1.2s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .hidden {
            display: none;
        }

        /* Modal Overlay Styling */
.modal-overlay {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(11, 15, 11, 0.95); /* Deep dark background */
    backdrop-filter: blur(8px);
    cursor: zoom-out;
}

/* Enlarged Image */
.modal-content {
    margin: auto;
    display: block;
    max-width: 90%;
    max-height: 90%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid #2a8c5e;
    box-shadow: 0 0 50px rgba(42, 140, 94, 0.5);
    border-radius: 10px;
}

/* Close Button */
.modal-close {
    position: absolute;
    top: 25px;
    right: 35px;
    color: #2ecc71;
    font-size: 50px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.modal-close:hover {
    color: #ff5f7c;
    text-shadow: 0 0 10px red;
}

.modal-caption {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: #5faf7a;
    font-size: 0.9rem;
    letter-spacing: 2px;
}

/* Add a pointer cursor to the original image to show it's clickable */
#plotImage {
    cursor: zoom-in;
}
    </style>
</head>
<body>
<div class="terminal-container">
    <div class="header">
        <div class="title">
            <span>VECTOR::EMBED</span>
        </div>
        <div class="status-led">
            <div class="led">DB active</div>
            <div class="led">coords cached</div>
        </div>
    </div>

    <!-- Gmail-like chips input field -->
    <div class="name-input-panel">
        <div class="chip-container" id="chipContainer">
            <!-- dynamic chips inserted here -->
        </div>
        <input type="text" id="nameInput" class="input-field" placeholder="enter name & press Enter ..." autofocus>
        <button class="analyze-btn" id="analyzeTrigger">
            <span> ANALYZE</span>
            <span style="font-size:1.2rem;">⚡</span>
        </button>
    </div>

    <!-- main grid -->
    <div class="dashboard-grid">
    <div class="similarities-panel">
        <div class="panel-header">⟡ PAIRWISE CONNECTIVITY (Similarity Score)</div>
        <div id="similarityList" class="similarity-list">
            </div>
    </div>

    <div class="graph-panel">
        <div class="panel-header">⬢ RADAR PROJECTION (Angle: Composition, Radius: Complexity)</div>
        <div class="graph-placeholder" id="graphPlaceholder">
            <img id="plotImage" alt="vector plot" style="display:none;"/>
            <div id="plotFallbackText">[ WAITING FOR DATA INPUT... ]</div>
        </div>
        <div class="coord-footprint" id="coordFootprint">
            </div>
    </div>
</div>
</div>
<div id="plotModal" class="modal-overlay">
    <span class="modal-close">&times;</span>
    <img id="modalImage" class="modal-content">
    <div class="modal-caption">ESC or Click to Close</div>
</div>
</body>
<script>

(function(){

let nameList=[];

const chipContainer=document.getElementById('chipContainer');
const nameInput=document.getElementById('nameInput');
const analyzeBtn=document.getElementById('analyzeTrigger');

const similarityDiv=document.getElementById('similarityList');
const plotImage=document.getElementById('plotImage');
const plotFallback=document.getElementById('plotFallbackText');
const coordFootprint=document.getElementById('coordFootprint');


function renderChips(){

chipContainer.innerHTML='';

nameList.forEach((name,index)=>{

const chip=document.createElement('span');

chip.className='chip';

chip.innerHTML=`
${name}
<button class="chip-remove" data-index="${index}">
×
</button>
`;

chipContainer.appendChild(chip);

});


document.querySelectorAll('.chip-remove')
.forEach(btn=>{

btn.onclick=()=>{

nameList.splice(btn.dataset.index,1);

renderChips();

clearResults();

};

});

}


function clearResults(){

plotImage.style.display='none';

plotFallback.style.display='block';

plotFallback.innerText='[ PENDING ANALYSIS ]';

coordFootprint.innerHTML='';

similarityDiv.innerHTML='';

}



nameInput.addEventListener('keydown',e=>{

if(e.key==='Enter' && nameInput.value.trim()){

nameList.push(nameInput.value.trim());

nameInput.value='';

renderChips();

clearResults();

}

});



async function fetchAnalysis(){

if(nameList.length<2){

alert("Enter at least 2 names");

return;

}


plotFallback.innerText='⟁ COMPUTING VECTORS...';


try{

const response=await fetch('/analyze/',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({names:nameList})

});


const data=await response.json();



/* -------- Similarity Scores ---------- */

similarityDiv.innerHTML=
data.similarities
.sort((a,b)=>b.score-a.score)
.map(s=>{

const score=s.score ?? 0;

return`

<div class="score-card">

<div class="pair-names">

<code>${s.pair[0]}</code> ↔ <code>${s.pair[1]}</code>

</div>

<div class="meter">

<div class="meter-fill"
style="width:${score*100}%">
</div>

</div>

<div class="score-value">

${score.toFixed(3)}

</div>

</div>

`;

}).join('');



/* -------- Polar Coordinates ---------- */

coordFootprint.innerHTML=

Object.entries(data.coordinates)

.map(([name,d])=>{


const r=d?.r ?? 0;

const theta=d?.theta ?? 0;

const x=d?.x ?? 0;

const y=d?.y ?? 0;


return`

<span>

⬤ ${name}

<small>

R:${r.toFixed(0)}

θ:${theta.toFixed(1)}°

(x:${x.toFixed(0)},y:${y.toFixed(0)})

</small>

</span>

`;

}).join('');



/* -------- Plot Image ---------- */

plotImage.src='/' + data.plot

+ '?t=' + new Date().getTime();


plotImage.style.display='block';

plotFallback.style.display='none';


}

catch(err){

console.error(err);

plotFallback.innerText='[ ERROR ]';

}

}


analyzeBtn.onclick=fetchAnalysis;

renderChips();

clearResults();

// --- Modal Logic ---
const plotModal = document.getElementById('plotModal');
const modalImg = document.getElementById('modalImage');
const closeBtn = document.querySelector('.modal-close');

// When the user clicks the plot image
plotImage.onclick = function() {
    if (plotImage.src) {
        plotModal.style.display = "block";
        modalImg.src = plotImage.src;
    }
}

// Close the modal when clicking (X), the background, or the image
plotModal.onclick = function() {
    plotModal.style.display = "none";
}

// Close with Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === "Escape") {
        plotModal.style.display = "none";
    }
});

})();

</script>

<style>
    .coord-footnote {
        margin-top: 12px;
        color: #528f68;
        font-size: 0.82rem;
        border-top: 1px solid #255f37;
        padding-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 20px 28px;
    }
    .coord-footnote span {
        color: #a9f7c3;
        background: #17331e;
        padding: 6px 14px;
        border-radius: 40px;
        border: 1px solid #3b9b61;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }
    .graph-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    #plotImage {
        max-width: 100%;
        object-fit: contain;
    }
</style>
</body>
</html>
